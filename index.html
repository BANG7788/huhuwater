        let compareList = [];
        let currentType = 'all';

        // 動態生成品牌選單
        function initBrandSelect() {
            const select = document.getElementById('brandSelect');
            const brands = [...new Set(products.map(p => p.brand))].sort();
            brands.forEach(b => {
                const opt = document.createElement('option');
                opt.value = b;
                opt.innerText = b;
                select.appendChild(opt);
            });
        }

        // 生成 LINE 連結的輔助函式
        function getLineLink(messageText) {
            const baseUrl = "https://line.me/R/ti/p/@278rcglr";
            return `${baseUrl}?text=${encodeURIComponent(messageText)}`;
        }

        // 渲染產品網格
        function renderProducts(list) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            
            document.getElementById('statsInfo').innerText = `📊 找到符合條件的產品：${list.length} 件`;

            if(list.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding: 40px; color:var(--gray);">找不到符合的產品，換個關鍵字搜尋看看吧！</div>`;
                return;
            }

            list.forEach(prod => {
                const isSelected = compareList.includes(prod.id) ? 'selected' : '';
                const btnText = compareList.includes(prod.id) ? '取消比較' : '加入比較';
                const lineMsg = `您好，我在您的網站看到【${prod.brand}】${prod.name}，售價 $${prod.price.toLocaleString()}，想跟阿胡諮詢安裝與環境評估！`;
                const lineUrl = getLineLink(lineMsg);

                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div>
                        <span class="brand-badge">${prod.brand}</span>
                        <div class="product-name">${prod.name}</div>
                        <div class="product-type">📁 ${prod.type}</div>
                    </div>
                    <div>
                        <div class="product-price">$${prod.price.toLocaleString()}</div>
                        <div class="card-actions">
                            <button class="btn btn-compare ${isSelected}" onclick="toggleCompare(${prod.id})">${btnText}</button>
                            <a class="btn btn-contact" href="${lineUrl}" target="_blank">詢問阿胡</a>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 類型切換
        function changeType(type, element) {
            currentType = type;
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            filterAndSearch();
        }

        // 綜合過濾與搜尋核心邏輯
        function filterAndSearch() {
            const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
            const brand = document.getElementById('brandSelect').value;

            let result = products;

            if (currentType !== 'all') {
                result = result.filter(p => p.type === currentType);
            }

            if (brand !== 'all') {
                result = result.filter(p => p.brand === brand);
            }

            if (keyword !== '') {
                result = result.filter(p => 
                    p.name.toLowerCase().includes(keyword) || 
                    p.brand.toLowerCase().includes(keyword) ||
                    p.spec.toLowerCase().includes(keyword)
                );
            }

            renderProducts(result);
        }

        // 切換加入/移除比較清單 (最多4款)
        function toggleCompare(id) {
            const index = compareList.indexOf(id);
            if (index > -1) {
                compareList.splice(index, 1);
            } else {
                if (compareList.length >= 4) {
                    alert('最多只能同時比較 4 款產品喔！請先移除其他商品。');
                    return;
                }
                compareList.push(id);
            }
            
            filterAndSearch(); 
            updateCompareTable();
        }

        // 清空所有比較
        function clearAllCompare() {
            compareList = [];
            filterAndSearch();
            updateCompareTable();
        }

        // 更新底部的比較表格
        function updateCompareTable() {
            const section = document.getElementById('compareSection');
            const table = document.getElementById('compareTable');
            
            if (compareList.length === 0) {
                section.classList.remove('active');
                return;
            }
            
            section.classList.add('active');
            const compItems = products.filter(p => compareList.includes(p.id));
            
            let html = `
                <tr>
                    <td><strong>型號/品牌</strong></td>
                    ${compItems.map(item => `<td><span style="color:var(--primary); font-size:0.8rem; font-weight:bold;">[${item.brand}]</span><br><strong>${item.name}</strong></td>`).join('')}
                </tr>
                <tr>
                    <td><strong>功能分類</strong></td>
                    ${compItems.map(item => `<td>${item.type}</td>`).join('')}
                </tr>
                <tr>
                    <td><strong>規格與特點說明</strong></td>
                    ${compItems.map(item => `<td style="font-size:0.85rem; color:#444; line-height:1.4;">${item.spec}</td>`).join('')}
                </tr>
                <tr>
                    <td><strong>阿胡特惠價</strong></td>
                    ${compItems.map(item => `<td style="color:#e63946; font-weight:bold; font-size:1.15rem;">$${item.price.toLocaleString()}</td>`).join('')}
                </tr>
                <tr>
                    <td><strong>快速行動</strong></td>
                    ${compItems.map(item => {
                        const cellMsg = `阿胡您好！我使用了線上對比功能，想深入詢問這款【${item.brand}】${item.name} 的到府安裝細節！`;
                        return `<td><a class="btn-line-inline" href="${getLineLink(cellMsg)}" target="_blank">🟢 LINE詢價這款</a></td>`;
                    }).join('')}
                </tr>
                <tr>
                    <td><strong>操作</strong></td>
                    ${compItems.map(item => `<td><button class="remove-compare" onclick="toggleCompare(${item.id})">❌ 移除對比</button></td>`).join('')}
                </tr>
            `;
            table.innerHTML = html;
        }

        // 頁面初始化
        window.onload = function() {
            initBrandSelect();
            renderProducts(products);
        };
    </script>
